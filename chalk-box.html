<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>1-4-1 展开图演示 (最终修正版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
        
        /* 极简控制面板 */
        #panel {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 240px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            z-index: 100;
            user-select: none;
        }

        h1 { 
            margin: 0 0 12px 0; 
            font-size: 16px; 
            color: #2c3e50; 
            border-bottom: 1px solid #ddd; 
            padding-bottom: 8px; 
            text-align: center;
        }

        .control-item { margin-bottom: 12px; }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 600; 
            color: #555; 
            margin-bottom: 4px; 
        }

        select { 
            width: 100%; 
            padding: 5px; 
            border: 1px solid #bdc3c7; 
            border-radius: 4px; 
            font-size: 12px; 
            outline: none; 
            background: #fff;
            transition: border-color 0.2s;
        }
        select:focus { border-color: #3498db; }

        input[type=range] { 
            width: 100%; 
            height: 4px;
            margin-top: 6px;
            cursor: pointer; 
            accent-color: #e67e22;
        }

        .status { 
            font-size: 12px; 
            text-align: center; 
            color: #27ae60; 
            font-weight: bold; 
            margin-top: 4px;
        }

        /* 图例 */
        .legend { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 12px; 
            padding-top: 10px; 
            border-top: 1px dashed #ccc; 
            font-size: 11px;
            color: #666;
        }
        
        .legend span { display: flex; align-items: center; }
        .dot { 
            width: 8px; height: 8px; 
            border-radius: 2px; 
            margin-right: 5px; 
            border: 1px solid #bbb; 
        }

        /* 提示 */
        .tips {
            font-size: 10px;
            color: #95a5a6;
            text-align: center;
            margin-top: 8px;
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="js/three.min.js"></script>
    <script src="js/OrbitControls.js"></script>
</head>
<body>

<div id="panel">
    <h1>📐 1-4-1 展开演示</h1>
    
    <div class="control-item">
        <label>变动“上面 (Top)”的位置：</label>
        <select id="typeSelect">
            <option value="top_pos_3">位置 3 (标准: 连正面)</option>
            <option value="top_pos_1">位置 1 (连背面)</option>
            <option value="top_pos_2">位置 2 (连左面)</option>
            <option value="top_pos_4">位置 4 (连右面)</option>
        </select>
    </div>

    <div class="control-item">
        <label>展开进度：</label>
        <input type="range" id="slider" min="0" max="1" step="0.002" value="0">
        <div class="status" id="statusText">完美闭合</div>
    </div>

    <div class="legend">
        <span><div class="dot" style="background:#fff"></div>正面(白)</span>
        <span><div class="dot" style="background:#e65100"></div>上面(橙)</span>
    </div>
    
    <div class="tips">🖱️ 左键旋转 · 右键平移 · 滚轮缩放</div>
</div>

<script>
    // ================= 1. 场景初始化 =================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x333333); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 7.5); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 8);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // ================= 2. 材质工场 =================
    
    function createTexture(text, bgColor, textColor, rotationAngle = 0) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, 512, 512);

        // 边框
        ctx.lineWidth = 16;
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.strokeRect(0, 0, 512, 512);

        if (text) {
            ctx.translate(256, 256);
            ctx.rotate(rotationAngle); 
            ctx.fillStyle = textColor;
            ctx.font = "bold 150px 'Microsoft YaHei', sans-serif"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 0);
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return new THREE.MeshStandardMaterial({ 
            map: texture, 
            roughness: 0.4, 
            metalness: 0.1,
            side: THREE.DoubleSide
        });
    }

    const matFront = createTexture("粉笔", "#ffffff", "#e65100", 0); 
    const matNormal = createTexture("", "#ecf0f1", "#000");       
    const matBack = createTexture("", "#bdc3c7", "#000");         

    // ================= 3. 核心构建逻辑 =================
    
    const SIZE = 2;
    const HALF = SIZE / 2;
    const geo = new THREE.PlaneGeometry(SIZE, SIZE);
    let root = null;
    let hinges = []; 

    function getFace(type, mat = null) {
        if (mat) return new THREE.Mesh(geo, mat);
        if (type === 'front') return new THREE.Mesh(geo, matFront);
        if (type === 'back') return new THREE.Mesh(geo, matBack);
        return new THREE.Mesh(geo, matNormal);
    }

    // 辅助函数：连接面
    function attach(parent, child, dir) {
        const pivot = new THREE.Group();
        parent.add(pivot);
        pivot.add(child);

        let px, py, cx, cy, axis, target;
        // 所有折叠都向Z轴负方向进行（盒子内部）
        if (dir === 'top') {
            px = 0; py = HALF; cx = 0; cy = HALF;
            axis = 'x'; target = -Math.PI/2;
        } 
        else if (dir === 'bottom') {
            px = 0; py = -HALF; cx = 0; cy = -HALF;
            axis = 'x'; target = Math.PI/2;
        } 
        else if (dir === 'left') {
            px = -HALF; py = 0; cx = -HALF; cy = 0;
            axis = 'y'; target = -Math.PI/2;
        } 
        else if (dir === 'right') {
            px = HALF; py = 0; cx = HALF; cy = 0;
            axis = 'y'; target = Math.PI/2;
        }

        pivot.position.set(px, py, 0);
        child.position.set(cx, cy, 0);

        hinges.push({ pivot, axis, target });
        return child; 
    }

    function buildModel(variant) {
        if (root) scene.remove(root);
        root = new THREE.Group();
        scene.add(root);
        hinges = [];

        // 1. 固定腰带：背(1) - 左(2) - 正(3) - 右(4)
        const front = getFace('front');
        root.add(front);

        const left = getFace('normal');
        attach(front, left, 'left');

        const back = getFace('back');
        attach(left, back, 'left');

        const right = getFace('normal');
        attach(front, right, 'right');

        // 2. 固定底面：连在正面下
        const bottom = getFace('normal');
        attach(front, bottom, 'bottom');

        // 3. 变动上面 (Top)
        let topMat;
        let topFace;

        if (variant === 'top_pos_3') {
            // 位置3 (正): 0度
            topMat = createTexture("粉笔", "#e65100", "#ffffff", 0);
            topFace = getFace('top', topMat);
            attach(front, topFace, 'top');
        }
        else if (variant === 'top_pos_2') {
            // 位置2 (左): 修正为 -90度 (逆时针)
            topMat = createTexture("粉笔", "#e65100", "#ffffff", -Math.PI/2);
            topFace = getFace('top', topMat);
            attach(left, topFace, 'top');
        }
        else if (variant === 'top_pos_1') {
            // 位置1 (背): 180度
            topMat = createTexture("粉笔", "#e65100", "#ffffff", Math.PI);
            topFace = getFace('top', topMat);
            attach(back, topFace, 'top');
        }
        else if (variant === 'top_pos_4') {
            // 位置4 (右): 修正为 90度 (顺时针)
            topMat = createTexture("粉笔", "#e65100", "#ffffff", Math.PI/2);
            topFace = getFace('top', topMat);
            attach(right, topFace, 'top');
        }
    }

    // ================= 4. 动画与交互 =================
    
    const slider = document.getElementById('slider');
    const statusText = document.getElementById('statusText');
    const typeSelect = document.getElementById('typeSelect');

    function update() {
        const t = parseFloat(slider.value); 
        if(t === 0) {
            statusText.innerText = "完美闭合";
            statusText.style.color = "#27ae60";
        } else if (t === 1) {
            statusText.innerText = "完全展开";
            statusText.style.color = "#3498db";
        } else {
            statusText.innerText = `演示中 ${(t*100).toFixed(0)}%`;
            statusText.style.color = "#e67e22";
        }

        hinges.forEach(h => {
            const angle = h.target * (1 - t);
            if (h.axis === 'x') h.pivot.rotation.x = angle;
            else h.pivot.rotation.y = angle;
        });
    }

    slider.addEventListener('input', update);
    typeSelect.addEventListener('change', (e) => {
        buildModel(e.target.value);
        update();
    });
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // 初始化
    buildModel('top_pos_3');
    update();
    animate();

</script>
</body>
</html>
